<div class="topup-page">

  <button class="topup-back" (click)="goBack()" type="button" aria-label="Volver">
    <i class="pi pi-arrow-left" aria-hidden="true"></i> Volver
  </button>

  <h1 class="topup-title">
    <i class="pi pi-wallet" aria-hidden="true"></i>
    Cargar saldo
  </h1>

  @if (isLoading()) {
    <div class="topup-loading" role="status">
      <i class="pi pi-spin pi-spinner topup-spinner" aria-hidden="true"></i>
      <span>Cargando wallet…</span>
    </div>
  } @else {

    <div class="balance-card" aria-label="Saldo actual">
      <span class="balance-label">Saldo actual</span>
      <span class="balance-amount">Q{{ wallet()?.balance ?? 0 | number:'1.2-2' }}</span>
      <span class="balance-currency">GTQ</span>
    </div>

    <div class="quick-amounts" role="group" aria-label="Montos rápidos">
      <span class="quick-label">Selecciona un monto</span>
      <div class="quick-grid">
        @for (preset of presets; track preset) {
          <button
            class="quick-btn"
            type="button"
            [class.quick-btn--active]="activePreset() === preset"
            (click)="selectPreset(preset)"
          >
            Q{{ preset }}
          </button>
        }
      </div>
    </div>

    @if (errorMsg()) {
      <p class="form-error" role="alert">{{ errorMsg() }}</p>
    }
    @if (successMsg()) {
      <p class="form-success" role="status">{{ successMsg() }}</p>
    }

    <app-dynamic-form
      [fields]="walletFields()"
      [initialData]="formPatch()"
      (data)="onFormSubmit($event)"
    />

  }
</div>
