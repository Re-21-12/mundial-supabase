<div hlmSidebarWrapper class="bg-background text-foreground w-full min-h-screen">
  <!-- Start Side bar -->
  <hlm-sidebar variant="inset" collapsible="icon">
    <div hlmSidebarHeader class="flex items-center justify-between">
      <span class="text-sm font-semibold tracking-tight">{{ title() }}</span>
      <button hlmSidebarRail aria-label="Alternar sidebar"></button>
    </div>

    <sidebar hlmSidebarContent>
      <div hlmSidebarGroup>
        <div hlmSidebarGroupLabel>Menú</div>
        <ul hlmSidebarMenu>
          @for (item of menuItems(); track item.path) {
            <li hlmSidebarMenuItem>
              <a
                hlmSidebarMenuButton
                [routerLink]="getRouteLink(item.path)"
                routerLinkActive="active"
                #rla="routerLinkActive"
                [attr.data-active]="rla.isActive"
                [tooltip]="item.title"
              >
                <ng-icon hlm [name]="item.icon" />
                <span>{{ item.title }}</span>
              </a>
            </li>
          }
        </ul>
      </div>
    </sidebar>
  </hlm-sidebar>
  <!-- End Side bar -->

  <main hlmSidebarInset class="flex flex-col min-h-screen">
    <header class="flex h-12 items-center justify-between px-4 border-b">
      <div class="flex items-center gap-2">
        <!-- Toggle -->
        <button hlmSidebarTrigger>
          <span class="sr-only">Alternar menú</span>
        </button>

        <app-global-search />
      </div>

      <div class="flex flex-row gap-4 items-center">
        <!-- Notificaciones -->
        <div class="relative">
          <button
            hlmBtn
            variant="ghost"
            size="icon"
            pTooltip="Notificaciones"
            tooltipPosition="bottom"
            type="button"
            (click)="toggleNotifications()"
          >
            <ng-icon hlm size="sm" name="lucideBell" />
            @if (headerUnreadCount() > 0) {
              <span class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-red-500 text-[10px] font-bold text-white">
                {{ headerUnreadCount() > 9 ? '9+' : headerUnreadCount() }}
              </span>
            }
          </button>

          @if (showNotifications()) {
            <div class="absolute right-0 top-full mt-2 w-80 z-50 shadow-xl rounded-lg overflow-hidden">
              <app-notification-inbox />
            </div>
          }
        </div>

        <button
          title="toggle"
          hlmBtn
          variant="ghost"
          size="icon"
          pTooltip="Profile"
          tooltipPosition="bottom"
          type="button"
          routerLink="/profile"
        >
          <ng-icon hlm size="sm" name="lucideUser" />
        </button>

        <button
          hlmBtn
          variant="ghost"
          size="icon"
          type="button"
          title="Toggle theme"
          pTooltip="Toggle theme"
          tooltipPosition="bottom"
          (click)="themeService.toggleTheme()"
        >
          @if (themeService.darkMode()) {
            <ng-icon hlm size="sm" name="lucideSun" />
          } @else {
            <ng-icon hlm size="sm" name="lucideMoon" />
          }
        </button>

        <button hlmBtn variant="ghost" size="icon" type="button" title="Cerrar sesión" pTooltip="Exit" tooltipPosition="bottom" (click)="authFacade.signOut()">
          <ng-icon hlm size="sm" name="lucideLogOut" />
        </button>
      </div>
    </header>

    <div class="flex-1 flex items-center justify-center overflow-auto p-4">
      <router-outlet />
    </div>
  </main>
</div>
